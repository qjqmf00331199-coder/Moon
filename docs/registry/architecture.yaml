# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: checkpoint_state_owner
    status: active
    api: UGameInstanceSubsystem (UMoonCheckpointSubsystem)
    not: "PlayerState or GameMode/GameState — both rejected: GameMode/GameState is destroyed on level travel (fails Arena Morphing survive-travel requirement); PlayerState would conflict with ADR-0001's decision that the player character does not require PlayerState ownership"
    adr: docs/architecture/0002-checkpoint-persistence.md
    reason: "GameInstanceSubsystem persists across level travel within one session, matching the in-memory-only, no-disk-I/O, survive-boss-transitions requirement"
    referenced_by:
      - docs/architecture/0002-checkpoint-persistence.md
    added: 2026-07-18
    revised: ""

  - purpose: enemy_ai_state_machine
    status: active
    api: "AIController + UBehaviorTree + UAIPerceptionComponent (classic, per-actor)"
    not: "Mass Framework (solves a swarm-scale problem MVP doesn't have — 2 archetypes, no confirmed large-swarm requirement) or StateTree (zero prior project experience/tooling, no requirement BT can't satisfy)"
    adr: docs/architecture/0006-enemy-ai-behavior-tree.md
    reason: "Single shared BT_Enemy_Base + Blackboard archetype branching keeps the state machine as one source of truth (enemy-ai-base.md Rule 1's shared-logic mandate). Boss Phase and future archetypes are expected to reuse this same pattern (enemy-ai-base.md Dependencies) — future ADRs for those systems must check this decision before introducing a different AI framework."
    referenced_by:
      - docs/architecture/0006-enemy-ai-behavior-tree.md
    added: 2026-07-23
    revised: ""

  - purpose: dash_motion_model
    status: active
    api: "Instant swept SetActorLocation position step (movement disabled for DashDuration, restored on end)"
    not: "LaunchCharacter / CharacterMovementComponent velocity override — superseded by commit 7f7e2e3 (\"make dash an instant step\"); reintroducing velocity-based dash would regress a deliberate, already-tuned decision"
    adr: docs/architecture/0007-dash-evasion-just-dodge.md
    reason: "Already shipped and tuned (TargetArmLength/camera pass in 2e6ba9f assumes this exact motion model); GDD Rule 2 was updated in the same commit pass to say \"즉시 위치 이동\" (instant position move), not velocity/impulse"
    referenced_by:
      - docs/architecture/0007-dash-evasion-just-dodge.md
    added: 2026-07-23
    revised: ""

