# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: direct_attributeset_write_on_restore
    status: active
    description: "Checkpoint restore must never write UMoonAttributeSet values directly.
      Restore must go through GameplayEffect application."
    why: "Direct attribute writes bypass GAS's effect-based mutation pipeline (aggregators,
      GameplayCue hooks, prediction) and can desync from the damage pipeline's Execution
      Calculation established in ADR-0001."
    adr: docs/architecture/0002-checkpoint-persistence.md
    added: 2026-07-18

  - pattern: hardcoded_camera_tuning_in_constructor
    status: active
    description: "Camera tuning values (arm length, socket offset, lag speed/distance,
      pitch clamp, FOV, probe size, etc.) must not be C++ constructor literals.
      Must be read from UMoonCameraSettings (UDataAsset) at BeginPlay."
    why: "camera-system-base.md's Tuning Knobs section explicitly mandates designer-tunable
      values without a recompile. The pre-ADR-0005 implementation violated this by
      hardcoding all values directly in MoonCharacterBase.cpp's constructor."
    adr: docs/architecture/0005-camera-system-springarm.md
    added: 2026-07-23

