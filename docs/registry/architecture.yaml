# Architecture Decision Registry
#
# PURPOSE: Single source of truth for key architectural stances that all ADRs
# must agree on. Skills check this before writing new ADRs to detect conflicts
# at authoring time — before stories are created against contradictory decisions.
#
# RULES:
#   - Register a stance when it constrains how OTHER systems must be built.
#     An internal implementation detail that affects only one ADR does not need
#     to be registered.
#   - Never delete entries — set status: superseded_by: ADR-NNNN instead.
#   - When a stance changes: update the entry, set revised: to today's date,
#     add a comment with the old value, and run /architecture-review to check
#     what ADRs are now invalidated.
#   - adr: is the authoritative source. All other ADRs that depend on this
#     stance list themselves in referenced_by.
#
# WRITTEN BY: /architecture-decision (Phase 5 — after ADR is approved)
# READ BY:    /architecture-decision (Step 2 — before authoring begins)
#             /architecture-review (Phase 4 — cross-ADR conflict baseline)
#             /create-stories (to embed architectural constraints in stories)
#             /dev-story (to check implementation against accepted stances)
#
# SEARCH PATTERNS (for skills using Grep):
#   All state owners:       Grep pattern="^  - state:" path="docs/registry/architecture.yaml"
#   Who owns player_health: Grep pattern="state: player_health"
#   All signal contracts:   Grep pattern="pattern: signal"
#   Budget for combat:      Grep pattern="system: combat"
#   All forbidden patterns: Grep pattern="^  - pattern:" (forbidden_patterns section)
#   Superseded entries:     Grep pattern="status: superseded"

version: 1
last_updated: "2026-07-23"

# ─── STATE OWNERSHIP ─────────────────────────────────────────────────────────
# Who is the authoritative owner of each piece of shared game state.
# Conflicts: two ADRs claiming to own the same state = data race / authority bug.
#
# Register state when it is READ or WRITTEN by more than one system.
# Internal-only state (never accessed by another system) does not need to be registered.
#
# Required fields: state, owner_system, adr, interface, referenced_by[], added
# interface: how other systems access this state (read-only property, method call,
#   signal, shared resource, etc.) — this is the contract other ADRs depend on.

state_ownership:
  - state: checkpoint_snapshot
    status: active
    owner_system: checkpoint-subsystem
    adr: docs/architecture/0002-checkpoint-persistence.md
    interface: "UMoonCheckpointSubsystem::CaptureCheckpoint(APawn*) / RestoreCheckpoint(APawn*) — memory-only, GameInstance-scoped, no disk I/O"
    write_access: checkpoint-subsystem-only
    referenced_by:
      - docs/architecture/0002-checkpoint-persistence.md
    added: 2026-07-18
    revised: ""

  - state: enemy_archetype_tuning
    status: active
    owner_system: enemy-ai (AMoonEnemyAIController / AMoonEnemyCharacterBase)
    adr: docs/architecture/0006-enemy-ai-behavior-tree.md
    interface: "UMoonEnemyArchetypeData (UDataAsset) — one instance per archetype, holds SightRange/SightAngle/BaseHearingRadius/MinEngageRange/MaxEngageRange/MinTelegraphWindow/AlertToIdleTimeout/RetreatPathfindFailTimeout/CorpseHoldDuration/MaxHealth/MeleeAttackRange"
    write_access: enemy-ai-only
    referenced_by:
      - docs/architecture/0006-enemy-ai-behavior-tree.md
      - docs/architecture/0007-dash-evasion-just-dodge.md
    added: 2026-07-23
    revised: "2026-07-23"
    # MeleeAttackRange field added by ADR-0007 (Dash/Evasion Just-Dodge IsInAttackRange check) —
    # ADR-0006 remains the owning ADR, ADR-0007 is an additive consumer/extender.

# Example:
#
# state_ownership:
#   - state: player_health
#     status: active           # active | superseded_by: ADR-NNNN
#     owner_system: health-system
#     adr: docs/architecture/adr-0001-health-system.md
#     interface: "HealthComponent.current_health (read-only float, range 0–max_health)"
#     write_access: health-system-only   # only owner can write; others read
#     referenced_by:
#       - docs/architecture/adr-0001-health-system.md
#       - docs/architecture/adr-0003-combat-system.md   # reads to apply damage
#       - docs/architecture/adr-0007-ui-system.md       # reads to display HUD
#     added: 2026-03-26
#     revised: ""


# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: checkpoint_capture_restore
    status: active
    pattern: direct_call
    producer: checkpoint-subsystem
    consumers:
      - health-damage-core (death handling calls RestoreCheckpoint instead of level reload)
      - checkpoint-trigger-actors (call CaptureCheckpoint on overlap)
      - boss-phase (calls CaptureCheckpoint at phase-start)
    adr: docs/architecture/0002-checkpoint-persistence.md
    signal_signature: "CaptureCheckpoint(APawn* Player): void / RestoreCheckpoint(APawn* Player): void / HasActiveCheckpoint(): bool"
    referenced_by:
      - docs/architecture/0002-checkpoint-persistence.md
    added: 2026-07-18
    revised: ""

  - contract: camera_tuning_data
    status: active
    pattern: shared_resource
    producer: camera-system (UMoonCameraSettings DataAsset)
    consumers:
      - camera-system (AMoonCharacterBase reads at BeginPlay)
      - camera-system (AMoonPlayerCameraManager reads pitch clamp + shake config)
    adr: docs/architecture/0005-camera-system-springarm.md
    signal_signature: "UMoonCameraSettings (UDataAsset) — single source of truth for all 12 camera Tuning Knobs values"
    referenced_by:
      - docs/architecture/0005-camera-system-springarm.md
    added: 2026-07-23
    revised: ""

  - contract: camera_pitch_ownership
    status: active
    pattern: direct_call
    producer: camera-system (AMoonPlayerCameraManager)
    consumers:
      - camera-system only — no other system reads or writes view pitch clamp
    adr: docs/architecture/0005-camera-system-springarm.md
    signal_signature: "Pitch clamp lives on AMoonPlayerCameraManager, NOT CharacterMovementComponent — camera-system-base.md Rule 2 explicitly assigns this ownership"
    referenced_by:
      - docs/architecture/0005-camera-system-springarm.md
    added: 2026-07-23
    revised: ""

  - contract: attack_telegraph_contract
    status: active
    pattern: signal
    producer: enemy-ai (AMoonEnemyCharacterBase, broadcast from AnimNotify pair)
    consumers:
      - dash-evasion (not yet designed — subscribes for just-dodge timing)
    adr: docs/architecture/0006-enemy-ai-behavior-tree.md
    signal_signature: "OnAttackTelegraphed() / OnAttackCommitted() — multicast delegates on the enemy Character instance, broadcast by UAnimNotify_AttackTelegraphed/UAnimNotify_AttackCommitted"
    referenced_by:
      - docs/architecture/0006-enemy-ai-behavior-tree.md
    added: 2026-07-23
    revised: ""

  - contract: enemy_telegraph_query
    status: active
    pattern: direct_call
    producer: enemy-ai (AMoonEnemyCharacterBase)
    consumers:
      - dash-evasion (UMoonGameplayAbility_Dash::CheckJustDodge — queries at dash-activation time, does not pre-subscribe)
    adr: docs/architecture/0007-dash-evasion-just-dodge.md
    signal_signature: "IsTelegraphingAttack(): bool / GetAttackCommittedTime(): float — additive query accessors on AMoonEnemyCharacterBase, set/cleared by the same AnimNotify pair as the attack_telegraph_contract delegates. Owning ADR is 0006; added by ADR-0007."
    referenced_by:
      - docs/architecture/0006-enemy-ai-behavior-tree.md
      - docs/architecture/0007-dash-evasion-just-dodge.md
    added: 2026-07-23
    revised: ""

