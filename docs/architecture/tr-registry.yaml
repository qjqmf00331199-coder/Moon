  # --- Spell Casting (base) (spell-casting-base.md) ---
  - id: TR-spell-001
    system: spell
    gdd: design/gdd/spell-casting-base.md
    requirement: "GAS pipeline: ASC + Mana AttributeSet, one GameplayAbility per element (InstancedPerActor), activation->commit->effect->EndAbility all complete in the SAME frame (zero recovery)"
