    revised: ""
    status: active
  - id: TR-hp-005
    system: hp
    gdd: design/gdd/health-damage-core.md
    requirement: "Execution API: State.Executable tag + TryExecute(Target) applying bypass-defense instant Health=0, removes tag, fires OnExecuted exactly once; fails silently when tag absent"
