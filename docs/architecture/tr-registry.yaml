    revised: ""
    status: active
  - id: TR-hp-004
    system: hp
    gdd: design/gdd/health-damage-core.md
    requirement: "Overlay state tags (State.Invulnerable, State.Executable) use reference-counted application so concurrent grantors don't prematurely clear; all overlay tags auto-clear on Death"
