  # --- Luna Overdrive (luna-overdrive.md) ---
  - id: TR-overdrive-001
    system: overdrive
    gdd: design/gdd/luna-overdrive.md
    requirement: "Subscribe to upstream OnOverdriveTriggered (payload-less) and enter Active state on the receiving frame"
