    revised: ""
    status: active
  - id: TR-overdrive-007
    system: overdrive
    gdd: design/gdd/luna-overdrive.md
    requirement: "Expose OnOverdriveStarted, OnOverdriveEnded(EndReason in {Expired, PlayerDeath}) exactly once per transition, and OverdriveTimeRemaining to downstream"
    created: 2026-07-18
    revised: ""
    status: active

