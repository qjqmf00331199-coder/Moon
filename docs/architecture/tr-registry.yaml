    revised: ""
    status: active
  - id: TR-spell-002
    system: spell
    gdd: design/gdd/spell-casting-base.md
    requirement: "Casting never sets MovementLocked; AddMovementInput ticks 100% during casts; no CancelAbility/BlockAbilitiesWithTag; only presentation montage blends out"
    created: 2026-07-18
    revised: ""
    status: active
  - id: TR-spell-003
    system: spell
    gdd: design/gdd/spell-casting-base.md
    requirement: "Per-element independent cooldown timers (GAS Cooldown GE + tag), no global/shared cooldown; single shared Mana/MaxMana with per-element ManaCost gate"
    created: 2026-07-18
    revised: ""
    status: active
  - id: TR-spell-004
    system: spell
    gdd: design/gdd/spell-casting-base.md
    requirement: "Cost/cooldown bypass via CostBypass.Active tag checked in BOTH CanActivateAbility() and ActivateAbility(); when present skip CommitAbility entirely so no cooldown GE enters (single tag, no partial bypass)"
    created: 2026-07-18
    revised: ""
    status: active
  - id: TR-spell-005
    system: spell
    gdd: design/gdd/spell-casting-base.md
    requirement: "Cast-rate limiter: hard cap 1 cast per element per frame plus global MaxCastsPerSecond (default 20), enforced regardless of bypass state"
    created: 2026-07-18
    revised: ""
    status: active
  - id: TR-spell-006
    system: spell
    gdd: design/gdd/spell-casting-base.md
    requirement: "Subscribe to Health/Damage Core OnExecuted to snap Mana to MaxMana via Instant Override GE; passive regen via Infinite/Periodic Add GE; PostGameplayEffectExecute clamps Mana 0-MaxMana (idempotent)"
    created: 2026-07-18
    revised: ""
    status: active
  - id: TR-spell-007
    system: spell
    gdd: design/gdd/spell-casting-base.md
    requirement: "Every spell impact calls MakeNoise with per-element NoiseLoudness; route all damage through Health/Damage Core single ApplyDamage entry (bBypassDefense overridable by downstream)"
    created: 2026-07-18
    revised: ""
    status: active
  - id: TR-spell-008
    system: spell
    gdd: design/gdd/spell-casting-base.md
    requirement: "Expose public events/data: OnSpellCast(Element)/OnSpellHit(Element,Target) delegates, Spell.Element.* tags, Mana/MaxMana + per-element cooldown state + CostBypass.Active for HUD binding"
    created: 2026-07-18
    revised: ""
    status: active
  - id: TR-spell-009
    system: spell
    gdd: design/gdd/spell-casting-base.md
    requirement: "Deterministic same-frame ordering: tag state change (bypass grant/release) applied BEFORE that frame's cast gate evaluation"
    created: 2026-07-18
    revised: ""
    status: active

