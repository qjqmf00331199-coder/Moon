    revised: ""
    status: active
  - id: TR-overdrive-002
    system: overdrive
    gdd: design/gdd/luna-overdrive.md
    requirement: "Grant/clear CostBypass.Active loose gameplay tag using non-counted set/clear semantics (SetLooseGameplayTagCount(1/0)) - explicitly NOT ref-counted Add/Remove - as the sole grantor"
