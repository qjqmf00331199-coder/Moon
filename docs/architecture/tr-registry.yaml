    revised: ""
    status: active
  - id: TR-hp-006
    system: hp
    gdd: design/gdd/health-damage-core.md
    requirement: "Immediate presentation-decoupled death: transition to Death on the frame Health<=0, not delayed by death animation; OnDeath fires exactly once even under same-frame multi-hit"
    created: 2026-07-18
    revised: ""
    status: active
  - id: TR-hp-007
    system: hp
    gdd: design/gdd/health-damage-core.md
    requirement: "Event exposure: OnDeath, OnExecuted, OnHealthPercentCrossed(threshold), Health/MaxHealth change delegates for HUD/Boss Phase/Combo Gauge/Luna Overdrive consumers"
    created: 2026-07-18
    revised: ""
    status: active
  - id: TR-hp-008
    system: hp
    gdd: design/gdd/health-damage-core.md
    requirement: "Runtime MaxHealth changes re-clamp CurrentHealth using absolute-value preservation (no proportional scaling); downward clamp must not by itself trigger Death if result>0"
    created: 2026-07-18
    revised: ""
    status: active
  - id: TR-hp-009
    system: hp
    gdd: design/gdd/health-damage-core.md
    requirement: "Death = instant checkpoint respawn (no full level reload, no disk I/O, no loading screen): restore player Transform + attribute values from last checkpoint snapshot"
    created: 2026-07-18
    revised: ""
    status: active

