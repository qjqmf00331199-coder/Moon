# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: effective_move_speed
    status: active
    source: design/gdd/player-movement.md
    referenced_by:
      - design/gdd/player-movement.md
    variables:
      - InputMagnitude
      - MaxWalkSpeed
    output_range: [0, 900]
    expression: "InputMagnitude * MaxWalkSpeed"
    notes: "InputMagnitude is 0.0-1.0 analog input. Output range uses the MaxWalkSpeed
      safe range upper bound (900); default tuning gives 0-600 uu/s."
    added: 2026-07-16
    revised: ""

  - name: jump_air_time
    status: active
    source: design/gdd/player-movement.md
    referenced_by:
      - design/gdd/player-movement.md
    variables:
      - JumpZVelocity
      - GravityScale
      - WorldGravityZ
    output_range: [0.8, 1.5]
    expression: "(2 * JumpZVelocity) / (GravityScale * WorldGravityZ)"
    notes: "WorldGravityZ is the UE engine default (980 uu/s^2), not a design tuning
      knob. Feeds Arena Morphing's aerial combat pacing (undesigned as of 2026-07-16)."
    added: 2026-07-16
    revised: ""

  - name: effective_damage_applied
    status: active
    source: design/gdd/health-damage-core.md
    referenced_by:
      - design/gdd/health-damage-core.md
    variables:
      - RawDamage
      - IsInvulnerable
      - HasActiveShield
      - bBypassDefense
    output_range: [0, 0]
    expression: "IsInvulnerable ? 0 : (HasActiveShield AND NOT bBypassDefense) ? 0 : RawDamage"
    notes: "Binary output, not a numeric range — always exactly 0 or RawDamage (no
      partial mitigation in this system, see health-damage-core.md Core Rule 2).
      output_range left as [0,0] since RawDamage is source-defined and unbounded;
      the real contract is 'either RawDamage or 0', not a continuous range."
    added: 2026-07-16
    revised: ""

  - name: new_health
    status: active
    source: design/gdd/health-damage-core.md
    referenced_by:
      - design/gdd/health-damage-core.md
    variables:
      - CurrentHealth
      - EffectiveDamageApplied
      - MaxHealth
    output_range: [0, 150]
    expression: "clamp(CurrentHealth - EffectiveDamageApplied, 0, MaxHealth)"
    notes: "Upper bound 150 reflects MaxHealth's Safe Range ceiling (max_health_player
      constant); actual per-entity MaxHealth varies (enemies defined in Enemy AI GDD)."
    added: 2026-07-16
    revised: ""

  - name: attack_telegraph_window
    status: active
    source: design/gdd/enemy-ai-base.md
    referenced_by:
      - design/gdd/enemy-ai-base.md
    variables:
      - AttackTelegraphFrame_Time
      - AttackCommitFrame_Time
    output_range: [0.3, 0.6]
    expression: "AttackCommitFrame_Time - AttackTelegraphFrame_Time"
    notes: "Must stay >= min_telegraph_window (0.4s default) or the attack is not
      fairly dodgeable. Consumed by Dash/Evasion (undesigned as of 2026-07-16) for
      just-dodge timing."
    added: 2026-07-16
    revised: ""

  - name: noise_detection_radius
    status: active
    source: design/gdd/enemy-ai-base.md
    referenced_by:
      - design/gdd/enemy-ai-base.md
      - design/gdd/spell-casting-base.md
    variables:
      - BaseHearingRadius
      - NoiseLoudness
    output_range: [0, 1200]
    expression: "BaseHearingRadius * NoiseLoudness"
    notes: "NoiseLoudness (0.0-1.0) is set by whichever system calls MakeNoise
      (player landing, spell impact, destructible collapse, etc.)."
    added: 2026-07-16
    revised: ""

  - name: ranged_engage_distance_check
    status: active
    source: design/gdd/enemy-ai-base.md
    referenced_by:
      - design/gdd/enemy-ai-base.md
    variables:
      - PlayerDistance
      - MinEngageRange
      - MaxEngageRange
    output_range: [0, 1]
    expression: "ShouldRetreat = PlayerDistance < MinEngageRange; ShouldAttack = MinEngageRange <= PlayerDistance <= MaxEngageRange"
    notes: "Boolean pair, not a continuous range — output_range left as [0,1] as a
      placeholder for 'one of two booleans', see health-damage-core.md's
      effective_damage_applied entry for the same convention."
    added: 2026-07-16
    revised: ""

  - name: effective_mana_cost
    status: active
    source: design/gdd/spell-casting-base.md
    referenced_by:
      - design/gdd/spell-casting-base.md
      - design/gdd/luna-overdrive.md
    variables:
      - ManaCost
      - bCostBypassed
    output_range: [0, 100]
    expression: "bCostBypassed ? 0 : ManaCost[Element]"
    notes: "Binary output — always exactly 0 or ManaCost[Element] (no partial cost).
      bCostBypassed set by Luna Overdrive (designed 2026-07-17) via the
      CostBypass.Active tag."
    added: 2026-07-17
    revised: ""

  - name: cast_gate_check
    status: active
    source: design/gdd/spell-casting-base.md
    referenced_by:
      - design/gdd/spell-casting-base.md
      - design/gdd/luna-overdrive.md
    variables:
      - Mana
      - ManaCost
      - OnCooldown
      - bCostBypassed
      - bCooldownBypassed
    output_range: [0, 1]
    expression: "CanCast = bCostBypassed ? true : (Mana >= ManaCost[Element]) AND (bCooldownBypassed ? true : NOT OnCooldown[Element])"
    notes: "Boolean output — output_range left as [0,1] per the health-damage-core.md
      convention for boolean-result formulas. NOTE: bCostBypassed and bCooldownBypassed
      look independent but are both driven by the single CostBypass.Active tag in MVP
      (spell-casting-base.md Core Rule 10) — they cannot diverge until Luna Overdrive
      splits the tag. Luna Overdrive (designed 2026-07-17) kept the single tag —
      no split in MVP scope (luna-overdrive.md Core Rule 2)."
    added: 2026-07-17
    revised: ""

  - name: new_mana
    status: active
    source: design/gdd/spell-casting-base.md
    referenced_by:
      - design/gdd/spell-casting-base.md
    variables:
      - CurrentMana
      - EffectiveManaCost
      - MaxMana
    output_range: [0, 100]
    expression: "clamp(CurrentMana - EffectiveManaCost, 0, MaxMana)"
    notes: "Mirrors health-damage-core.md's new_health formula structure. Core
      Extraction Execution's OnExecuted event bypasses this formula entirely and
      snaps Mana directly to MaxMana (see Mana_OnExecuted in spell-casting-base.md)."
    added: 2026-07-17
    revised: ""

  - name: spell_noise_loudness
    status: active
    source: design/gdd/spell-casting-base.md
    referenced_by:
      - design/gdd/spell-casting-base.md
      - design/gdd/enemy-ai-base.md
    variables:
      - Element
    output_range: [0.6, 1.0]
    expression: "NoiseLoudness[Element] = Blackhole:1.0, Fire:0.6, Lightning:0.7"
    notes: "Feeds directly into enemy-ai-base.md's noise_detection_radius formula
      as the NoiseLoudness input — the two formulas are chained across documents.
      output_range [0.6,1.0] reflects CURRENT default values; the tuning Safe Range
      is 0.3-1.0 with ordinal invariant Blackhole >= Lightning >= Fire
      (spell-casting-base.md Tuning Knobs, 2026-07-17 review)."
    added: 2026-07-17
    revised: ""

